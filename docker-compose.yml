version: '3.9'

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - '5000:5000'
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend/src:/app/src       # hot reload in dev
      - uploads_data:/app/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Frontend (dev server) ───────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000

volumes:
  mongo_data:
  redis_data:
  uploads_data:
